<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maximum.Creations — Watermark Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      color: #c9a84c;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      border: 0.5px solid #c9a84c44;
      border-radius: 4px;
      padding: 48px 40px;
      text-align: center;
    }
    .brand { font-size: 11px; letter-spacing: 0.3em; color: #c9a84c88; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 400; letter-spacing: 0.08em; margin-bottom: 6px; }
    .divider { width: 60px; height: 0.5px; background: #c9a84c55; margin: 20px auto; }
    .subtitle { font-size: 13px; color: #c9a84c77; letter-spacing: 0.05em; margin-bottom: 36px; font-family: Arial, sans-serif; line-height: 1.6; }
    .drop-zone { border: 0.5px dashed #c9a84c55; border-radius: 2px; padding: 36px 20px; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 24px; position: relative; }
    .drop-zone:hover, .drop-zone.dragover { border-color: #c9a84c; background: #c9a84c08; }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.6; }
    .drop-text { font-size: 13px; letter-spacing: 0.08em; color: #c9a84c99; font-family: Arial, sans-serif; }
    .file-name { font-size: 12px; color: #c9a84c; margin-top: 10px; font-family: Arial, sans-serif; }
    .btn { width: 100%; padding: 14px; background: transparent; border: 0.5px solid #c9a84c; color: #c9a84c; font-family: Georgia, serif; font-size: 13px; letter-spacing: 0.2em; cursor: pointer; transition: background 0.2s; border-radius: 2px; }
    .btn:hover:not(:disabled) { background: #c9a84c14; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status { margin-top: 24px; font-size: 12px; font-family: Arial, sans-serif; letter-spacing: 0.06em; min-height: 20px; color: #c9a84c88; }
    .progress-bar { width: 100%; height: 1px; background: #c9a84c22; margin-top: 12px; display: none; border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; background: #c9a84c; width: 0%; transition: width 0.4s; }
    .download-section { margin-top: 28px; display: none; }
    .download-btn { display: inline-block; padding: 14px 32px; border: 0.5px solid #c9a84c; color: #c9a84c; text-decoration: none; font-family: Georgia, serif; font-size: 13px; letter-spacing: 0.2em; transition: background 0.2s; border-radius: 2px; }
    .download-btn:hover { background: #c9a84c14; }
    .error { color: #e05555; }
    .success { color: #c9a84c; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">MAXIMUM.CREATIONS</div>
    <h1>Watermark Studio</h1>
    <div class="divider"></div>
    <p class="subtitle">Upload your video and receive a watermarked<br>version ready to publish.</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="videoInput" accept="video/mp4,video/quicktime,video/mov,video/*" />
      <div class="drop-icon">&#9655;</div>
      <div class="drop-text">DROP VIDEO HERE OR CLICK TO BROWSE</div>
      <div class="drop-text" style="margin-top:6px;font-size:11px;opacity:0.6;">MP4, MOV — up to 100MB</div>
      <div class="file-name" id="fileName"></div>
    </div>

    <button class="btn" id="uploadBtn" disabled onclick="uploadVideo()">APPLY WATERMARK</button>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status" id="status"></div>

    <div class="download-section" id="downloadSection">
      <div class="divider"></div>
      <p style="font-size:12px;letter-spacing:0.1em;color:#c9a84c88;margin-bottom:16px;font-family:Arial,sans-serif;">YOUR WATERMARKED VIDEO IS READY</p>
      <a id="downloadLink" class="download-btn" download>DOWNLOAD VIDEO</a>
    </div>
  </div>

  <script>
    const CLOUD_NAME = 'dty2hrdti';
    const UPLOAD_PRESET = 'maximum_watermark';

    const input = document.getElementById('videoInput');
    const btn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const fileName = document.getElementById('fileName');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const downloadSection = document.getElementById('downloadSection');
    const downloadLink = document.getElementById('downloadLink');
    const dropZone = document.getElementById('dropZone');

    input.addEventListener('change', () => {
      if (input.files[0]) {
        fileName.textContent = input.files[0].name;
        btn.disabled = false;
        downloadSection.style.display = 'none';
        status.textContent = '';
      }
    });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('video/')) {
        input.files = e.dataTransfer.files;
        fileName.textContent = file.name;
        btn.disabled = false;
      }
    });

    async function uploadVideo() {
      const file = input.files[0];
      if (!file) return;

      btn.disabled = true;
      downloadSection.style.display = 'none';
      progressBar.style.display = 'block';
      progressFill.style.width = '0%';
      status.className = 'status';
      status.textContent = 'Uploading to Cloudinary...';

    const formData = new FormData();
formData.append('file', file);
formData.append('upload_preset', UPLOAD_PRESET);
formData.append('folder', 'watermarked');

      try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);

        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 80);
            progressFill.style.width = pct + '%';
            status.textContent = `Uploading... ${pct}%`;
          }
        };

      xhr.onload = function() {
  try {
    const data = JSON.parse(xhr.responseText);
    if (xhr.status !== 200 || !data.public_id) {
      status.className = 'status error';
      status.textContent = 'Upload error: ' + (data.error?.message || 'Unknown error');
      progressFill.style.width = '0%';
      btn.disabled = false;
      return;
    }

    status.textContent = 'Applying watermark...';
    progressFill.style.width = '95%';

    const watermarkedUrl =
      `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/` +
      `l_${WATERMARK_PUBLIC_ID},g_south_east,x_20,y_20,w_300,o_80/fl_layer_apply/` +
      `${data.public_id}.mp4`;

    console.log('Watermarked URL:', watermarkedUrl);

    progressFill.style.width = '100%';
    status.className = 'status success';
    status.textContent = 'Watermark applied successfully.';
    downloadLink.href = watermarkedUrl;
    downloadLink.textContent = 'DOWNLOAD VIDEO';
    downloadSection.style.display = 'block';

  } catch(e) {
    status.className = 'status error';
    status.textContent = 'Unexpected error — please try again.';
    progressFill.style.width = '0%';
  }
  btn.disabled = false;
};

        xhr.onerror = function() {
          status.className = 'status error';
          status.textContent = 'Upload failed — please try again.';
          progressFill.style.width = '0%';
          btn.disabled = false;
        };

        xhr.send(formData);
      } catch (err) {
        status.className = 'status error';
        status.textContent = 'Error: ' + err.message;
        progressFill.style.width = '0%';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
